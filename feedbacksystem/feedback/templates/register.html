<!DOCTYPE html>
<html>
<head>
<title>Student Registration</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#eaf4ff;
}

.container{
    width:420px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#0d6efd;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#084298;
}

p{
    text-align:center;
}

a{
    color:#0d6efd;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

<h2>Student Registration</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email Address" required>

<input type="text" name="phone" placeholder="Phone Number" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

<p>
Already have an account?
<a href="/login/">Login</a>
</p>

</div>

</body>
</html>
