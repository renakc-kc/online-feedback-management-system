<!DOCTYPE html>
<html>
<head>
    <title>Send Feedback</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#eaf4ff;
        }

        .header{
            background:#0d6efd;
            color:white;
            padding:20px;
            text-align:center;
            font-size:28px;
            font-weight:bold;
        }

        .container{
            width:500px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#0d6efd;
        }

        input, textarea{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        textarea{
            height:120px;
            resize:none;
        }

        button{
            width:100%;
            padding:12px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#084298;
        }

        .back{
            display:block;
            text-align:center;
            margin-top:15px;
            color:#0d6efd;
            text-decoration:none;
        }
    </style>
</head>

<body>

<div class="header">
    Online Feedback Management System
</div>

<div class="container">

<h2>Send Feedback</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="subject" placeholder="Enter Subject" required>

<textarea name="message" placeholder="Write your feedback here..." required></textarea>

<button type="submit">Submit Feedback</button>

</form>

<a href="/dashboard/" class="back">← Back to Dashboard</a>

</div>

</body>
</html
