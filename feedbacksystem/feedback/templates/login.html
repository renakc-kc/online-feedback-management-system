<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>
    <style>
        body{
            margin:0;
            padding:0;
            font-family:Arial, sans-serif;
            background:#eaf4ff;
        }

        .container{
            width:350px;
            margin:80px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 15px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#0d6efd;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:10px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#084298;
        }

        a{
            text-decoration:none;
            color:#0d6efd;
        }

        p{
            text-align:center;
        }

        .error{
            color:red;
            text-align:center;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Student Login</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">
{% csrf_token %}

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p>
Don't have an account?
<a href="/register/">Register</a>
</p>

</div>

</body>
</html>
