<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <style>

    body{
        margin:0;
        font-family:Arial, sans-serif;
        background:#eaf4ff;
    }

    .header{
        background:#0d6efd;
        color:white;
        padding:20px;
        text-align:center;
        font-size:28px;
        font-weight:bold;
    }

    .container{
        width:380px;
        margin:60px auto;
        background:white;
        padding:30px;
        border-radius:10px;
        box-shadow:0 0 15px rgba(0,0,0,.2);
    }

    h2{
        text-align:center;
        color:#0d6efd;
    }

    input{
        width:100%;
        padding:10px;
        margin:12px 0;
        border:1px solid #ccc;
        border-radius:5px;
        font-size:16px;
    }

    button{
        width:100%;
        padding:12px;
        background:#0d6efd;
        color:white;
        border:none;
        border-radius:5px;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:#084298;
    }

    .back{
        display:block;
        text-align:center;
        margin-top:15px;
        text-decoration:none;
        color:#0d6efd;
    }

    </style>

</head>

<body>

<div class="header">
    Online Feedback Management System
</div>

<div class="container">

<h2>Administrator Login</h2>

<form method="POST">
{% csrf_token %}

<input type="email" name="email" placeholder="email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<a href="/login/" class="back">Student Login</a>

</div>

</body>
</html>
