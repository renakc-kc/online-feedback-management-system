<!DOCTYPE html>
<html>
<head>
    <title>View Students</title>

    <style>
        body{
            font-family:Arial,sans-serif;
            background:#eaf4ff;
            margin:0;
        }

        .header{
            background:#0d6efd;
            color:white;
            padding:20px;
            text-align:center;
            font-size:28px;
            font-weight:bold;
        }

        .container{
            width:90%;
            margin:30px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
            color:#0d6efd;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#0d6efd;
            color:white;
            padding:12px;
        }

        td{
            padding:10px;
            border-bottom:1px solid #ddd;
            text-align:center;
        }

        tr:nth-child(even){
            background:#f7f7f7;
        }

        .back{
            display:inline-block;
            margin-top:20px;
            padding:10px 20px;
            background:#0d6efd;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }
    </style>
</head>

<body>

<div class="header">
Online Feedback Management System
</div>

<div class="container">

<h2>Registered Students</h2>

<table>
<tr>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
</tr>

{% for s in students %}
<tr>
    <td>{{ s.name }}</td>
    <td>{{ s.email }}</td>
    <td>{{ s.phone }}</td>
</tr>
{% endfor %}

</table>

<br>

<a href="/admindashboard/" class="back">Back to Dashboard</a>

</div>

</body>
</html>
