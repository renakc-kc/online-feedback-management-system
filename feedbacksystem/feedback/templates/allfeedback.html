<!DOCTYPE html>
<html>
<head>
    <title>All Feedback</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f7fc;
            padding:30px;
        }

        h2{
            text-align:center;
            color:#0d6efd;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th{
            background:#0d6efd;
            color:white;
            padding:12px;
        }

        td{
            padding:10px;
            border:1px solid #ddd;
            text-align:center;
        }

        tr:nth-child(even){
            background:#f9f9f9;
        }

        a{
            text-decoration:none;
            background:#0d6efd;
            color:white;
            padding:10px 20px;
            border-radius:5px;
        }

        a:hover{
            background:#084298;
        }
    </style>

</head>

<body>

<h2>All Student Feedback</h2>

<table>

<tr>
    <th>Student</th>
    <th>Subject</th>
    <th>Message</th>
    <th>Status</th>
    <th>Reply</th>
    <th>Delete</th>
</tr>

{% for f in feedback %}

<tr>
    <td>{{ f.student.name }}</td>
    <td>{{ f.subject }}</td>
    <td>{{ f.message }}</td>
    <td>{{ f.status }}</td>

    <td>
        <form method="POST" action="/reply/{{ f.id }}/">
            {% csrf_token %}

            <textarea name="reply" rows="3" cols="30">{{ f.reply }}</textarea>

            <br><br>

            <button type="submit">Save Reply</button>
        </form>
    </td>
    <td>
    <a href="/deletefeedback/{{ f.id }}/"
       onclick="return confirm('Are you sure you want to delete this feedback?')"
       style="background:red;color:white;padding:8px 12px;text-decoration:none;border-radius:5px;">
       Delete
    </a>
    </td>
</tr>

{% endfor %}

</table>

<br><br>

<a href="/admindashboard/">← Back to Dashboard</a>

</body>
</html>
