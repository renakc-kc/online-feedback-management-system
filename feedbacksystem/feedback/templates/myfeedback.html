<!DOCTYPE html>
<html>
<head>
<title>My Feedback</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#eaf4ff;
}

.header{
    background:#0d6efd;
    color:white;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.container{
    width:90%;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#0d6efd;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0d6efd;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

tr:nth-child(even){
    background:#f7f7f7;
}

.back{
    display:inline-block;
    margin-top:20px;
    padding:10px 20px;
    background:#0d6efd;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

.back:hover{
    background:#084298;
}

</style>

</head>

<body>

<div class="header">
Online Feedback Management System
</div>

<div class="container">

<h2>My Feedback</h2>

<table>

<tr>
<th>Subject</th>
<th>Message</th>
<th>Status</th>
<th>Reply</th>
</tr>

{% for f in feedback %}

<tr>
<td>{{ f.subject }}</td>
<td>{{ f.message }}</td>
<td>{{ f.status }}</td>
<td>{{ f.reply }}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/dashboard/" class="back">Back to Dashboard</a>

</div>

</body>
</html>
